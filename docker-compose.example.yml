services:
  athenaeum:
    container_name: athenaeum
    build: .
    # image: ghcr.io/your-username/athenaeum:latest
    ports:
      - "8741:8741"
    volumes:
      - ./data:/data
      - /path/to/media/books:/output
      - /path/to/downloads:/downloads
    environment:
      - DATA_DIR=/data
    networks:
      - your_network

networks:
  your_network:
    external: true
