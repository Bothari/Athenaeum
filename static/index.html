<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athenaeum</title>
  <link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>
  <nav id="nav">
    <div class="nav-inner">
      <a href="#/" class="nav-logo">Athenaeum</a>
      <div class="nav-links">
        <div class="nav-dropdown">
          <button class="nav-btn nav-dropdown-trigger" id="library-menu-btn">
            Library
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav-dropdown-menu" id="library-menu">
            <a href="#/library/books" class="nav-dropdown-item">Books</a>
            <a href="#/library/authors" class="nav-dropdown-item">Authors</a>
            <a href="#/library/series" class="nav-dropdown-item">Series</a>
          </div>
        </div>
        <a href="#/requests" class="nav-btn">Queue</a>
        <a href="#/dashboard" class="nav-btn">Dashboard</a>
        <a href="#/settings" class="nav-btn">Settings</a>
      </div>
    </div>
  </nav>

  <div id="banner" class="banner-abs hidden"></div>

  <main id="main">
    <div id="app"></div>
  </main>

  <!-- Mobile bottom nav (icons injected by app.js) -->
  <nav id="nav-bottom">
    <a href="#/" class="nav-bottom-btn" id="nb-search"></a>
    <button class="nav-bottom-btn" id="nb-library"></button>
    <a href="#/requests" class="nav-bottom-btn" id="nb-queue"></a>
    <a href="#/dashboard" class="nav-bottom-btn" id="nb-dashboard"></a>
    <a href="#/settings" class="nav-bottom-btn" id="nb-settings"></a>
  </nav>

  <!-- Library popup for mobile bottom nav -->
  <div id="nb-library-popup" class="nb-library-popup" style="display:none">
    <a href="#/library/books" class="nb-library-popup-item">Books</a>
    <a href="#/library/authors" class="nb-library-popup-item">Authors</a>
    <a href="#/library/series" class="nb-library-popup-item">Series</a>
  </div>

  <div id="toast-container"></div>

  <script src="/static/app.js?v=2"></script>
</body>
</html>
